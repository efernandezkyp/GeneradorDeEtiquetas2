services:
  backend:
    build:
      context: ./backend
    container_name: etiquetas-backend
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://postgres.fxwrlrnjxumiqzesbczf:[YOUR-PASSWORD]@aws-1-us-east-1.pooler.supabase.com:6543/postgres?pgbouncer=true
      DIRECT_URL: postgresql://postgres.fxwrlrnjxumiqzesbczf:[YOUR-PASSWORD]@aws-1-us-east-1.pooler.supabase.com:5432/postgres
      JWT_SECRET: change-me-in-production
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_SECRET: change-me-too
      JWT_REFRESH_EXPIRES_IN: 7d
      GOOGLE_CLIENT_ID: ''
      GOOGLE_CLIENT_SECRET: ''
      GOOGLE_CALLBACK_URL: http://localhost:3001/api/auth/google/callback
      CORS_ORIGIN: http://localhost:3000
      FRONTEND_URL: http://localhost:3000
      LOG_LEVEL: info
    ports:
      - '3001:3001'
  frontend:
    build:
      context: ./frontend
    container_name: etiquetas-frontend
    depends_on:
      - backend
    ports:
      - '3000:3000'
